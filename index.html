function getCanvasXY(e) {
    const rect = canvas.getBoundingClientRect();
    const src = e.changedTouches ? e.changedTouches[0] : e;
    return {
        x: (src.clientX - rect.left) * GW / rect.width,
        y: (src.clientY - rect.top)  * GH / rect.height,
    };
}
function onCanvasTap(x, y) {
    if (gameState === 'title') { howtoPage = 0; gameState = 'howto'; setButtons(false); return; }
    if (gameState === 'howto') {
        howtoPage++;
        if (howtoPage >= 2) { startGame(); }
        return;
    }
    if (gameState === 'clear') { gameState = 'title'; setButtons(false); return; }
    if (gameState === 'mini')  { handleMiniTap(x, y); }
    if (gameState === 'shooting') { handleShootingTap(x, y); }
    if (gameState === 'amida') { handleAmidaTap(x, y); }
}

function getShootZone(x, y) {
    if (y < SHOOT_BTN_Y) return 'none';
    if (x < 210) return 'left';
    if (x < 420) return 'right';
    if (x > 440) return 'fire';
    return 'none';
}
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
        const rect = canvas.getBoundingClientRect();
        const cx = (t.clientX - rect.left) * GW / rect.width;
        const cy = (t.clientY - rect.top)  * GH / rect.height;
        if (gameState === 'shooting') {
            const z = getShootZone(cx, cy);
            if (z === 'left')  { shootZoneLeft  = true; continue; }
            if (z === 'right') { shootZoneRight = true; continue; }
            if (z === 'fire')  { shootZoneFire = true; handleShootingTap(cx, cy); continue; }
        }
        onCanvasTap(cx, cy);
    }
}, { passive: false });
canvas.addEventListener('touchend', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
        const rect = canvas.getBoundingClientRect();
        const cx = (t.clientX - rect.left) * GW / rect.width;
        const cy = (t.clientY - rect.top)  * GH / rect.height;
        const z = getShootZone(cx, cy);
        if (z === 'left')  shootZoneLeft  = false;
        if (z === 'right') shootZoneRight = false;
        if (z === 'fire')  shootZoneFire  = false;
        if (z === 'none') { shootZoneLeft = false; shootZoneRight = false; shootZoneFire = false; }
    }
}, { passive: false });
canvas.addEventListener('touchcancel', () => { shootZoneLeft = false; shootZoneRight = false; shootZoneFire = false; });
canvas.addEventListener('mousedown', e => {
    const { x, y } = getCanvasXY(e);

        const z = getShootZone(x, y);
        if (z === 'left')  { shootZoneLeft  = true; return; }
        if (z === 'right') { shootZoneRight = true; return; }
        if (z === 'fire')  { shootZoneFire = true; handleShootingTap(x, y); return; }
    }
    onCanvasTap(x, y);
});
canvas.addEventListener('mouseup', () => { shootZoneLeft = false; shootZoneRight = false; shootZoneFire = false; });

function handleMiniTap(x, y) {
    for (let i = 0; i < MINI_TASKS.length; i++) {
        const cy = cardY(i);
        if (x >= CX && x <= CX + CW && y >= cy && y <= cy + CH) {
            const t = MINI_TASKS[i];
            if (i === 0 && !t.done) {
                initShooting(); return;
            }
            if (i === 2 && !t.done && !amidaAttempted) {
                initAmida(); gameState = 'amida'; return;
            }
            if (!t.done) {
                t.progress = Math.min(100, t.progress + 3);
                if (t.progress >= 100) t.done = true;
            }
        }
    }
}

function lerpColor(c1, c2, t) {
    t = Math.max(0, Math.min(1, t));
    const h = (s, i) => parseInt(s.replace('#', '').slice(i * 2, i * 2 + 2), 16);
    return `rgb(${Math.round(h(c1,0)+(h(c2,0)-h(c1,0))*t)},${Math.round(h(c1,1)+(h(c2,1)-h(c1,1))*t)},${Math.round(h(c1,2)+(h(c2,2)-h(c1,2))*t)})`;
}
function getBg(elapsed) {
    if (elapsed < 30) return { sky1:'#C8F0FF', sky2:'#FFDEDE', sky3:'#FFB8B8', gum:'#FF9090', gl:'#FF6060', phase:'morning' };
    if (elapsed < 50) {
        const t = (elapsed - 30) / 20;
        return { sky1:lerpColor('#C8F0FF','#FF8800',t), sky2:lerpColor('#FFDEDE','#FF4400',t), sky3:lerpColor('#FFB8B8','#CC2200',t), gum:lerpColor('#FF9090','#CC5050',t), gl:lerpColor('#FF6060','#AA2020',t), phase:'evening' };
    }
    const t = Math.min((elapsed - 50) / 8, 1);
    return { sky1:lerpColor('#FF8800','#05051E',t), sky2:lerpColor('#FF4400','#0A0A32',t), sky3:lerpColor('#CC2200','#12081A',t), gum:lerpColor('#CC5050','#8B2550',t), gl:lerpColor('#AA2020','#5B1030',t), phase:'night' };
}

function tryDig() {
    if (digCooldown > 0 || !P.onGround) return;
    const pcx = P.x + P.w / 2;
    for (const t of TEETH) {
        if (t.hp <= 0 || pcx < t.x || pcx > t.x + t.w) continue;
        const surface = getToothSurface(t, pcx);
        if (Math.abs(P.y + P.h - surface) > 8) continue;
        const col = t.cols[0];
        const pulpDepth = t.h - PULP_H;
        if (col.depth >= pulpDepth) return;
        col.depth = Math.min(col.depth + HOLE_DIG * ATK, pulpDepth);
        t.hp = Math.max(1, Math.round(t.mhp * (1 - col.depth / pulpDepth)));
        if (col.depth >= pulpDepth) {
            t.hp = 0;
            spawnPopup(t.x + t.w/2, GY - t.h - 28, '💀 神経到達！', '#FF2255');
            score += 30;
        }
        digCooldown = 0.22;
        P.lockedTooth = t; P.lockedCol = 0;
        spawnDust(t.x + t.w * 0.5, GY - t.h + col.depth);
        return;
    }
}

function updateBrush(dt, elapsed) {
    const isNight = elapsed >= 58;
    const interval = isNight ? 5 : 12;
    const spd = isNight ? 370 : 290;

    if (brushWarning <= 0 && elapsed >= nextBrushTime) {
        brushWarning = 0.8;
        nextBrushTime += interval;
    }
    if (brushWarning > 0) {
        brushWarning -= dt;
        if (brushWarning <= 0) { brushes.push({ x: -210, dir: 1, speed: spd }); }
    }

    for (let i = brushes.length - 1; i >= 0; i--) {
        const b = brushes[i];
        b.x += b.dir * b.speed * dt;
        if (b.x > GW + 50) b.dir = -1;
        if (b.x < -210 && b.dir < 0) { brushes.splice(i, 1); continue; }
        if (P.stunned > 0) continue;
        const bx = b.x, bw = 170, by = GY - 85, bh = 52;
        if (!(P.x + P.w > bx && P.x < bx + bw && P.y + P.h > by && P.y < by + bh)) continue;
        let safe = false;
        const foot = P.y + P.h;
        for (const t of TEETH) {
            if (t.hp <= 0) continue;
            if (P.x + P.w > t.x && P.x < t.x + t.w && foot > GY - t.h + SAFE_DEPTH) { safe = true; break; }
        }
        if (!safe) {
            const pen = brushPenaltyHalf ? 5 : 10;
            P.stunned = 2;
            score = Math.max(0, score - pen);
            spawnPopup(P.x + P.w / 2, P.y - 10, '-' + pen + '点！', '#FF5555');
        }
    }
}

function updateDropBrush(dt, elapsed) {
    const isNight = elapsed >= 58;
    const dropInterval = isNight ? 5 : 14;
    const dropSpeed   = isNight ? 520 : 380;

    if (elapsed >= nextDropTime) {
        const tx = 60 + Math.random() * (GW - 120);
        dropBrushes.push({ x: tx, y: -110, warning: 0.9, active: false, speed: dropSpeed });
        nextDropTime += dropInterval;
    }

    for (let i = dropBrushes.length - 1; i >= 0; i--) {
        const b = dropBrushes[i];
        if (!b.active) {
            b.warning -= dt;
            if (b.warning <= 0) b.active = true;
            continue;
        }
        b.y += b.speed * dt;
        if (b.y > GY + 30) { dropBrushes.splice(i, 1); continue; }
        if (P.stunned > 0) continue;
        if (!(P.x + P.w > b.x - 13 && P.x < b.x + 13 && P.y + P.h > b.y + 20 && P.y < b.y + 95)) continue;
        const pen = brushPenaltyHalf ? 5 : 10;
        P.stunned = 2;
        score = Math.max(0, score - pen);
        spawnPopup(P.x + P.w / 2, P.y - 10, '-' + pen + '点！', '#FF5555');
    }
}

function updateCandies(dt) {
    candyTimer -= dt;
    if (candyTimer <= 0) {
        spawnCandy();
        if (candyDouble) spawnCandy();
        candyTimer = candyDouble ? 1.0 + Math.random() * 0.8 : 1.8 + Math.random() * 1.5;
    }
    autoScoreTimer += dt;
    if (autoScoreTimer >= 3) { score++; autoScoreTimer -= 3; }
    for (let i = candies.length - 1; i >= 0; i--) {
        const c = candies[i];
        c.x += c.vx * dt; c.age += dt;
        if (c.x < -50 || c.x > GW + 50) { candies.splice(i, 1); continue; }
        const dy2 = c.y + Math.sin(c.age * c.floatSpeed + c.floatOffset) * 12;
        if (Math.abs(P.x + P.w/2 - c.x) < 22 && Math.abs(P.y + P.h/2 - dy2) < 22) {
            score += c.pts;
            spawnPopup(c.x, dy2, '+' + c.pts + '点');
            candies.splice(i, 1);
        }
    }
}

const SHOOTING_TOTAL = 10, SHOOTING_TIME = 15;
let cursorX = GW/2, shootCooldown = 0;
let shooterBullets = [], shootingPastes = [];
let shootingTimer = 0, shootingShot = 0, shootingElapsed = 0;
let shootingState = 'play'; // 'play'|'clear'|'fail'
let shootingResultTimer = 0;
let shootingBangs = []; // 爆発エフェクト {x, y, t}

function exitShooting() {
    gameState = 'mini';
    shootZoneLeft = false; shootZoneRight = false; shootZoneFire = false;
}

function initShooting() {
    cursorX = GW/2; shootCooldown = 0;
    shooterBullets = []; shootingPastes = []; shootingBangs = [];
    const rowYs = [145, 265];
    for (let i=0; i<SHOOTING_TOTAL; i++) {
        const col = i % 5, row = Math.floor(i / 5);
        const bx = 75 + col * ((GW-150)/4);
        shootingPastes.push({
            x: bx, y: rowYs[row], baseY: rowYs[row],
            vx: (Math.random()-0.5)*50,
            phase: Math.random()*Math.PI*2,
            alive: true
        });
    }
    shootingTimer = SHOOTING_TIME; shootingShot = 0; shootingElapsed = 0;
    shootingState = 'play'; shootingResultTimer = 0;
    gameState = 'shooting';
    shootZoneLeft = false; shootZoneRight = false; shootZoneFire = false;
}

function handleShootingTap(x, y) {
    if (shootingState !== 'play') { if (shootingResultTimer <= 0) exitShooting(); return; }
    if (shootCooldown <= 0) {
        shooterBullets.push({ x:cursorX, y:GH + 5, vx:0, vy:-720 });
        shootCooldown = 0.18;
    }
}

function updateShooting(dt) {
    for (let i=shootingBangs.length-1; i>=0; i--) {
        shootingBangs[i].t -= dt;
        if (shootingBangs[i].t <= 0) shootingBangs.splice(i, 1);
    }
    if (shootingState !== 'play') {
        shootingResultTimer -= dt;
        if (shootingResultTimer <= 0 && shootingState !== 'play') exitShooting();
        return;
    }
    // カーソル移動
    if (shootZoneLeft)  cursorX = Math.max(30, cursorX - 420 * dt);
    if (shootZoneRight) cursorX = Math.min(GW-30, cursorX + 420 * dt);
    // 撃つ（押しっぱなし連射）
    if (shootCooldown > 0) shootCooldown -= dt;
    if (shootZoneFire && shootCooldown <= 0) {
        shooterBullets.push({ x:cursorX, y:GH + 5, vx:0, vy:-720 });
        shootCooldown = 0.18;
    }
    // 弾移動
    for (let i=shooterBullets.length-1; i>=0; i--) {
        const b=shooterBullets[i]; b.y+=b.vy*dt;
        if (b.y<-20) shooterBullets.splice(i,1);
    }
    // タイマー
    shootingTimer -= dt;
    if (shootingTimer <= 0) { shootingState='fail'; shootingResultTimer=2.5; return; }
    // 歯みがき粉 浮遊移動
    shootingElapsed += dt;
    for (const p of shootingPastes) {
        if (!p.alive) continue;
        p.x += p.vx * dt;
        if (p.x < 50) { p.x = 50; p.vx = Math.abs(p.vx); }
        if (p.x > GW-50) { p.x = GW-50; p.vx = -Math.abs(p.vx); }
        p.y = p.baseY + Math.sin(shootingElapsed * 1.4 + p.phase) * 25;
    }
    // 弾 vs 歯みがき粉
    for (let bi=shooterBullets.length-1; bi>=0; bi--) {
        const b=shooterBullets[bi]; let hit=false;
        for (const p of shootingPastes) {
            if (!p.alive) continue;
            if (Math.abs(b.x-p.x)<36&&Math.abs(b.y-p.y)<40) {
                p.alive=false; shootingShot++;
                shootingBangs.push({x:p.x,y:p.y,t:0.5}); hit=true; break;
            }
        }
        if (hit) shooterBullets.splice(bi,1);
    }
    if (shootingShot>=SHOOTING_TOTAL) {
        shootingState='clear'; shootingResultTimer=2.5;
        MINI_TASKS[0].done=true; MINI_TASKS[0].progress=100; return;
    }
}

function drawShooting() {
    ctx.fillStyle='#0a1428'; ctx.fillRect(0,0,GW,GH);
    ctx.strokeStyle='rgba(0,100,255,0.1)'; ctx.lineWidth=1;
    for (let gx=0;gx<GW;gx+=40){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,GH);ctx.stroke();}
    for (let gy=0;gy<GH;gy+=40){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(GW,gy);ctx.stroke();}

    ctx.fillStyle='#FF8888'; ctx.font='bold 20px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('🪥 歯みがき粉シューティング！', GW/2, 12);
    const rem=Math.max(0,shootingTimer);
    ctx.fillStyle=rem<5?'#FF4444':'#FFE040'; ctx.font='bold 15px sans-serif';
    ctx.fillText('残り '+Math.ceil(rem)+'秒　|　残り '+(SHOOTING_TOTAL-shootingShot)+'個', GW/2, 40);

    for (const p of shootingPastes) {
        if (!p.alive) continue;
        ctx.save(); ctx.translate(p.x, p.y);
        ctx.fillStyle='#FFFFFF'; ctx.beginPath(); rrect(-26,-42,52,62,11); ctx.fill();
        ctx.fillStyle='#2288EE'; ctx.beginPath(); rrect(-26,-42,52,22,7); ctx.fill();
        ctx.fillStyle='#CCEEFF'; ctx.beginPath(); rrect(-20,-42,40,14,5); ctx.fill();

    }

    // 弾
    for (const b of shooterBullets) {
        ctx.save();
        ctx.fillStyle='#FFE040'; ctx.shadowColor='#FF8800'; ctx.shadowBlur=10;
        ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    // 爆発エフェクト
    for (const b of shootingBangs) {
        const a = b.t / 0.5;

        ctx.font=`${(28+(1-a)*30)|0}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('💥', b.x, b.y);
        ctx.restore();
    }

    // ===== canvas内ボタン =====
    const BH = GH - SHOOT_BTN_Y;
    const MY = SHOOT_BTN_Y + BH/2;
    // ◀ ボタン（左端）
    ctx.fillStyle = shootZoneLeft ? 'rgba(100,180,255,0.7)' : 'rgba(60,100,160,0.55)';
    ctx.beginPath(); rrect(8, SHOOT_BTN_Y+6, 195, BH-12, 14); ctx.fill();
    ctx.fillStyle='#FFF'; ctx.font='bold 32px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('◀', 105, MY);
    // ▶ ボタン（◀の右）
    ctx.fillStyle = shootZoneRight ? 'rgba(100,255,180,0.7)' : 'rgba(60,160,100,0.55)';
    ctx.beginPath(); rrect(213, SHOOT_BTN_Y+6, 195, BH-12, 14); ctx.fill();
    ctx.fillStyle='#FFF'; ctx.font='bold 32px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('▶', 310, MY);
    // 撃つボタン（右半分）
    const fireActive = shootCooldown > 0.12;
    ctx.fillStyle = fireActive ? 'rgba(255,180,0,0.85)' : 'rgba(200,80,0,0.65)';
    ctx.beginPath(); rrect(448, SHOOT_BTN_Y+6, GW-458, BH-12, 14); ctx.fill();

    ctx.beginPath(); ctx.moveTo(cursorX, GH); ctx.lineTo(cursorX, 60); ctx.stroke();
    ctx.setLineDash([]);
    // 下端の位置インジケーター（▲）
    ctx.fillStyle='#FFE040';
    ctx.beginPath(); ctx.moveTo(cursorX, GH-2); ctx.lineTo(cursorX-10, GH+12); ctx.lineTo(cursorX+10, GH+12); ctx.closePath(); ctx.fill();

        ctx.font='bold 30px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';

        if (shootingResultTimer<=0) {
            ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='16px sans-serif';
            ctx.fillText('👆 タップして戻る', GW/2, GH/2+28);
        }
    }
}

// ===== あみだくじミニゲーム =====
const AMIDA_COL_XS = [200, 427, 654];
const AMIDA_TOP_Y = 150, AMIDA_BOT_Y = 370;
let amidaState = 'select';
let amidaSelected = -1;
let amidaBars = [];
let amidaResultOf = [0,1,2];
let amidaPhoneBottom = 0;
let amidaRevealT = 0;
let amidaAttempted = false;
const AMIDA_REVEAL_DUR = 1.8;
let amidaCutinTimer = 0;

function initAmida() {
    amidaBars = [];
    const yLevels = [185, 220, 255, 295, 330];
    for (const y of yLevels) {
        if (Math.random() < 0.65) amidaBars.push({ y, left: Math.floor(Math.random() * 2) });
    }
    while (amidaBars.length < 2) {
        const y = yLevels[Math.floor(Math.random() * yLevels.length)];
        if (!amidaBars.some(b => b.y === y)) amidaBars.push({ y, left: Math.floor(Math.random() * 2) });
    }
    amidaResultOf = [0,1,2].map(s => {
        let c = s;
        for (const b of [...amidaBars].sort((a,b)=>a.y-b.y)) {
            if (c === b.left) c = b.left+1; else if (c === b.left+1) c = b.left;
        }
        return c;
    });
    amidaPhoneBottom = Math.floor(Math.random() * 3);
    amidaState = 'select'; amidaSelected = -1; amidaRevealT = 0; amidaCutinTimer = 0;
}

function getAmidaPath(startCol) {
    const path = []; let col = startCol, y = AMIDA_TOP_Y;
    for (const bar of [...amidaBars].sort((a,b)=>a.y-b.y)) {
        if (bar.y > y) { path.push({type:'v',col,y1:y,y2:bar.y}); y = bar.y; }
        if (col === bar.left || col === bar.left+1) {
            const nc = col === bar.left ? bar.left+1 : bar.left;
            path.push({type:'h',y:bar.y,col1:col,col2:nc}); col = nc;
        }
    }
    path.push({type:'v',col,y1:y,y2:AMIDA_BOT_Y});
    return path;
}

function getAmidaDotPos(path, progress) {
    let totalLen = 0;
    for (const s of path) totalLen += s.type==='v' ? s.y2-s.y1 : Math.abs(AMIDA_COL_XS[s.col2]-AMIDA_COL_XS[s.col1]);
    let rem = Math.min(progress, 1) * totalLen;
    for (const s of path) {
        const len = s.type==='v' ? s.y2-s.y1 : Math.abs(AMIDA_COL_XS[s.col2]-AMIDA_COL_XS[s.col1]);
        if (rem <= len) {
            const t = len > 0 ? rem/len : 0;
            if (s.type==='v') return {x:AMIDA_COL_XS[s.col], y:s.y1+t*(s.y2-s.y1)};
            return {x:AMIDA_COL_XS[s.col1]+t*(AMIDA_COL_XS[s.col2]-AMIDA_COL_XS[s.col1]), y:s.y};
        }
        rem -= len;
    }
    const last = path[path.length-1];
    return {x:AMIDA_COL_XS[last.col], y:last.y2};
}

function handleAmidaTap(x, y) {
    if (amidaState === 'select') {
        for (let c=0; c<3; c++) {
            if (Math.abs(x - AMIDA_COL_XS[c]) < 56 && y < AMIDA_TOP_Y + 20) {
                amidaSelected = c; amidaState = 'reveal'; amidaRevealT = 0; return;
            }
        }
    } else if (amidaState === 'done' && amidaCutinTimer <= 0) {
        gameState = 'mini';
    }
}

function updateAmida(dt) {
    if (amidaState === 'reveal') {
        amidaRevealT += dt;
        if (amidaRevealT >= AMIDA_REVEAL_DUR) {
            amidaState = 'done';
            if (amidaResultOf[amidaSelected] === amidaPhoneBottom) {
                MINI_TASKS[2].done = true; MINI_TASKS[2].progress = 100;
                amidaCutinTimer = 3.5;
            } else {
                amidaAttempted = true;
            }
        }
    }
    if (amidaCutinTimer > 0) {
        amidaCutinTimer -= dt;
        if (amidaCutinTimer <= 0) gameState = 'mini';
    }
}

function drawAmida() {
    ctx.fillStyle='#08101e'; ctx.fillRect(0,0,GW,GH);
    ctx.strokeStyle='rgba(50,100,180,0.13)'; ctx.lineWidth=1;
    for (let gx=0;gx<GW;gx+=40){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,GH);ctx.stroke();}
    for (let gy=0;gy<GH;gy+=40){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(GW,gy);ctx.stroke();}

    ctx.fillStyle='#FFE040'; ctx.font='bold 22px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('📞 歯医者キャンセル大作戦！', GW/2, 14);
    ctx.fillStyle='#AABBCC'; ctx.font='14px sans-serif';
    ctx.fillText('📞 が当たり！　コースを1つ選んでタップ！', GW/2, 44);

    const COL_COLS = ['#FF8888','#88DDFF','#88FF88'];
    for (let c=0; c<3; c++) {
        ctx.strokeStyle=COL_COLS[c]; ctx.lineWidth=6;
        ctx.beginPath(); ctx.moveTo(AMIDA_COL_XS[c],AMIDA_TOP_Y); ctx.lineTo(AMIDA_COL_XS[c],AMIDA_BOT_Y); ctx.stroke();
    }
    for (const bar of amidaBars) {
        ctx.strokeStyle='rgba(255,255,180,0.9)'; ctx.lineWidth=5;
        ctx.beginPath(); ctx.moveTo(AMIDA_COL_XS[bar.left],bar.y); ctx.lineTo(AMIDA_COL_XS[bar.left+1],bar.y); ctx.stroke();
    }

    for (let c=0; c<3; c++) {
        const cx = AMIDA_COL_XS[c], isSel = amidaSelected===c;
        ctx.fillStyle = isSel ? 'rgba(255,220,0,0.35)' : 'rgba(255,255,255,0.08)';
        ctx.strokeStyle = isSel ? '#FFE040' : COL_COLS[c]; ctx.lineWidth = isSel ? 3 : 2;
        ctx.beginPath(); rrect(cx-52,AMIDA_TOP_Y-60,104,54,10); ctx.fill(); ctx.stroke();
        const pulse = amidaState==='select' ? 0.7+0.3*Math.sin(Date.now()/280+c*1.5) : 1;
        ctx.save(); ctx.globalAlpha=pulse;
        ctx.font='28px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('📞', cx, AMIDA_TOP_Y-33);
        ctx.restore();
    }

    const showBot = amidaState==='done' || (amidaState==='reveal' && amidaRevealT>AMIDA_REVEAL_DUR*0.85);
    for (let c=0; c<3; c++) {
        const cx = AMIDA_COL_XS[c];
        ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.strokeStyle=COL_COLS[c]; ctx.lineWidth=2;
        ctx.beginPath(); rrect(cx-52,AMIDA_BOT_Y+8,104,50,10); ctx.fill(); ctx.stroke();
        ctx.font='28px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(showBot ? (c===amidaPhoneBottom?'📞':'✕') : '❓', cx, AMIDA_BOT_Y+33);
    }

    if (amidaSelected>=0 && amidaState!=='select') {
        const path = getAmidaPath(amidaSelected);
        const {x:dx, y:dy} = getAmidaDotPos(path, amidaRevealT/AMIDA_REVEAL_DUR);
        ctx.save();
        ctx.shadowColor='#FFE040'; ctx.shadowBlur=20;
        ctx.beginPath(); ctx.arc(dx,dy,14,0,Math.PI*2);
        ctx.fillStyle='rgba(255,215,0,0.9)'; ctx.fill();
        ctx.font='17px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('📞',dx,dy);
        ctx.restore();
    }

    if (amidaState==='done') {
        if (amidaCutinTimer>0) {
            const PW=520,PH=130,PX=(GW-PW)/2,PY=(GH-PH)/2-19;
            const ph=Math.sin(amidaCutinTimer*10);
            ctx.save();
            ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,GW,GH);
            ctx.shadowColor='rgba(0,220,120,0.8)'; ctx.shadowBlur=20+5*ph;
            ctx.fillStyle='#fffef0'; ctx.strokeStyle='#44CC88'; ctx.lineWidth=4;
            ctx.beginPath(); rrect(PX,PY,PW,PH,18); ctx.fill(); ctx.stroke();
            ctx.shadowBlur=0;
            ctx.fillStyle='#220044'; ctx.font='bold 16px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText('「1週間後の予約を', PX+PW/2, PY+PH/2-18);
            ctx.font='bold 20px sans-serif';
            ctx.fillText('キャンセルでお願いします！」', PX+PW/2, PY+PH/2+12);
            ctx.font='26px serif';
            ctx.fillText('📞😊✨', PX+PW/2, PY+PH/2+48);
            ctx.restore();
        } else {
            const ok = amidaResultOf[amidaSelected]===amidaPhoneBottom;
            ctx.fillStyle=ok?'#44FF88':'#FF4466';
            ctx.font='bold 26px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(ok?'✅ キャンセル成功！':'📵 つながらなかった…', GW/2, AMIDA_BOT_Y+105);
            ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='15px sans-serif';
            ctx.fillText('👆 タップして戻る', GW/2, AMIDA_BOT_Y+140);
        }
    }

    if (amidaState==='select') {
        const p=0.6+0.4*Math.sin(Date.now()/400);
        ctx.save(); ctx.globalAlpha=p;
        ctx.fillStyle='#FFE040'; ctx.font='bold 15px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText('↑ 上のコースをタップして選ぼう！', GW/2, GH-18);
        ctx.restore();
    }
}

function updateMini(dt) {
    if (MINI_TASKS.every(t => t.done)) {
        if (MINI_TASKS[0].done) brushPenaltyHalf = true;
        if (MINI_TASKS[1].done) candyDouble = true;
        superMode = true;
        const elapsed = (Date.now() - t0) / 1000;
        if (nextBrushTime <= elapsed + 5) nextBrushTime = elapsed + 15;
        gameState = 'play';
        setButtons(true);
    }
}

function updatePlay(dt) {
    const elapsed = (Date.now() - t0) / 1000;

    if (!miniTriggered) {
        if (miniCutInTimer <= 0 && elapsed >= 27.8) miniCutInTimer = 2.2;
        if (miniCutInTimer > 0) {
            miniCutInTimer -= dt;
            if (miniCutInTimer <= 0) {
                miniTriggered = true; gameState = 'mini';
                MINI_TASKS.forEach(t => { t.progress = 0; t.done = false; });
                setButtons(false); return;
            }
        }
    }
    if (TEETH.every(t => t.hp <= 0)) {
        gameState = 'clear'; clearTime = elapsed; setButtons(false); return;
    }
    if (superMode && !superModeAnnounced) {
        spawnPopup(GW / 2, GH / 2 - 40, '👑 スーパー虫歯マン！ ATK2倍！', '#FFD700');
        superModeAnnounced = true;
    }

    const weapon = getWeapon();
    if (weapon.atk > lastATK) {
        spawnPopup(GW / 2, GH / 2 - 30, '⬆️ ' + weapon.name + ' に進化！', '#FFD700');
        lastATK = weapon.atk;
    }
    ATK = superMode ? weapon.atk * 2 : weapon.atk;

    if (P.stunned > 0) { P.stunned -= dt; P.vx = 0; }
    else P.vx = keys.left ? -210 : keys.right ? 210 : 0;

    P.vy += GRAV * dt;
    const prevBot = P.y + P.h;
    P.x += P.vx * dt; P.y += P.vy * dt;
    P.x = Math.max(0, Math.min(GW - P.w, P.x));

    // ロック中の歯のX範囲を完全に出たらロック解除（隣の歯への移行を正常に処理するため）
    if (P.lockedTooth && (P.x >= P.lockedTooth.x + P.lockedTooth.w || P.x + P.w <= P.lockedTooth.x)) {
        P.lockedTooth = null; P.lockedCol = -1;
    }

    P.onGround = false;

    if (P.vy >= 0) {
        for (const t of TEETH) {
            if (t.hp <= 0 || P.x + P.w <= t.x || P.x >= t.x + t.w) continue;
            const surface = getToothSurface(t, P.x + P.w / 2);
            if (prevBot <= surface + 4 && P.y + P.h >= surface) {
                P.y = surface - P.h; P.vy = 0; P.onGround = true; P.jumps = 0;
                P.lockedTooth = t; P.lockedCol = 0;
                break;
            }
        }
    }
    // 穴の中にいるときは第二パスをスキップ（隣の歯に吹き飛ぶのを防ぐ）
    const inDugCol = P.lockedTooth && P.lockedTooth.hp > 0 &&
        P.lockedTooth.cols[0] && P.lockedTooth.cols[0].depth > 0;
    if (!inDugCol) {
        for (const t of TEETH) {
            if (t.hp <= 0 || P.x + P.w <= t.x || P.x >= t.x + t.w) continue;
            const top = GY - t.h, foot = P.y + P.h;
            if (foot <= top || foot >= GY) continue;
            if (getToothSurface(t, P.x + P.w / 2) === top) {
                P.y = top - P.h; if (P.vy > 0) P.vy = 0; P.onGround = true; P.jumps = 0;
            }
            break;
        }
    }
    if (P.y + P.h >= GY) { P.y = GY - P.h; P.vy = 0; P.onGround = true; P.jumps = 0; P.lockedTooth = null; P.lockedCol = -1; }

    if (digCooldown > 0) digCooldown -= dt;
    if (keys.dig && P.stunned <= 0) tryDig();

    // キャラクターアニメーション更新
    pAnim.phase += dt * (Math.abs(P.vx) > 10 ? 12 : 2.5);
    const tiltTarget = P.vx > 0 ? 0.13 : P.vx < 0 ? -0.13 : 0;
    pAnim.tilt += (tiltTarget - pAnim.tilt) * 14 * dt;
    if (!pAnim.prevGround && P.onGround) { pAnim.sqX=1.35; pAnim.sqY=0.72; } // 着地スクワッシュ
    if (P.vy < -80 && !P.onGround)       { pAnim.sqX=0.82; pAnim.sqY=1.28; } // ジャンプ伸び
    pAnim.sqX += (1-pAnim.sqX) * 14*dt;
    pAnim.sqY += (1-pAnim.sqY) * 14*dt;
    pAnim.prevGround = P.onGround;
    if (P.vx > 10) pAnim.facing = 1;
    else if (P.vx < -10) pAnim.facing = -1;

    for (let i = dustParticles.length - 1; i >= 0; i--) {
        const d = dustParticles[i];
        d.x += d.vx * dt; d.y += d.vy * dt; d.vy += 200 * dt; d.life -= dt;
        if (d.life <= 0) dustParticles.splice(i, 1);
    }
    for (let i = popups.length - 1; i >= 0; i--) {
        const p = popups[i];
        p.y -= 55 * dt; p.life -= dt;
        if (p.life <= 0) popups.splice(i, 1);
    }

    updateCandies(dt);
    updateBrush(dt, elapsed);
    updateDropBrush(dt, elapsed);
}

function update(dt) {
    if (gameState === 'play') updatePlay(dt);
    else if (gameState === 'mini') updateMini(dt);
    else if (gameState === 'shooting') updateShooting(dt);
    else if (gameState === 'amida') updateAmida(dt);
}

function buildToothPath(t) {
    const x = t.x, w = t.w, top = GY - t.h;
    ctx.beginPath();
    switch (t.n) {
        case 1: // 中切歯 — ほぼ平坦な切縁
            ctx.moveTo(x, GY); ctx.lineTo(x, top+20);
            ctx.lineTo(x+w*.08, top+7); ctx.lineTo(x+w*.5, top+1); ctx.lineTo(x+w*.92, top+7);
            ctx.lineTo(x+w, top+20); ctx.lineTo(x+w, GY); break;
        case 2: // 側切歯 — 切縁にわずかな丸み
            ctx.moveTo(x, GY); ctx.lineTo(x, top+20);
            ctx.lineTo(x+w*.10, top+6); ctx.lineTo(x+w*.5, top+2); ctx.lineTo(x+w*.90, top+7);
            ctx.lineTo(x+w, top+20); ctx.lineTo(x+w, GY); break;
        case 3: // 犬歯 — 鋭い単一尖頭、最長歯冠
            ctx.moveTo(x, GY); ctx.lineTo(x, top+40);
            ctx.lineTo(x+w*.25, top+14); ctx.lineTo(x+w*.48, top);
            ctx.lineTo(x+w*.72, top+20); ctx.lineTo(x+w, top+40);
            ctx.lineTo(x+w, GY); break;
        case 4: // 第一小臼歯 — 頬側咬頭＞舌側咬頭
            ctx.moveTo(x, GY); ctx.lineTo(x, top+20);
            ctx.lineTo(x+w*.18, top+3); ctx.lineTo(x+w*.36, top+16);
            ctx.lineTo(x+w*.58, top+7); ctx.lineTo(x+w*.76, top+16);

function drawCols(t) {

    const top = GY - t.h;
    const pulpDepth = t.h - PULP_H;
    const pulpY = GY - PULP_H;
    const CW = Math.floor(t.w * 0.52);
    const cx = t.x + Math.floor((t.w - CW) / 2);
    const depth = t.cols[0].depth;
    const prox = depth / pulpDepth;
    const pulse = 0.28 + 0.18 * Math.sin(Date.now() / 280);
    ctx.save(); buildToothPath(t); ctx.clip();
    // Guide outline
    ctx.strokeStyle = 'rgba(160,100,55,0.3)';
    ctx.setLineDash([3,4]); ctx.lineWidth = 1;
    ctx.strokeRect(cx, top + depth, CW, pulpDepth - depth);
    ctx.setLineDash([]);

    if (depth > 0) {
        ctx.fillStyle = '#040100';
        ctx.fillRect(cx, top, CW, depth);
        ctx.fillStyle = 'rgba(80,30,0,0.55)';
        ctx.fillRect(cx, top, 2, depth);
        ctx.fillRect(cx+CW-2, top, 2, depth);
    }
    // Pulp zone
    ctx.fillStyle = `rgba(200,20,60,${(0.22 + prox*0.55).toFixed(2)})`;
    ctx.fillRect(cx, pulpY, CW, PULP_H);
    ctx.fillStyle = `rgba(255,80,130,${(pulse*(0.4+prox*0.6)).toFixed(2)})`;
    ctx.fillRect(cx, pulpY, CW, PULP_H);
    ctx.fillStyle = `rgba(255,200,220,${(0.5+pulse).toFixed(2)})`;
    ctx.beginPath();
    ctx.arc(cx+CW/2, pulpY+PULP_H/2, Math.min(CW/4,5), 0, Math.PI*2);

function drawToothFace(t) {
    const ratio = t.hp / t.mhp;
    const cx = t.x + t.w / 2;
    const cy = GY - t.h * 0.78;
    const es = Math.min(t.w * 0.1, 5.5);
    const eo = Math.min(t.w * 0.2, 11);
    if (t.hp <= 0) {
        ctx.strokeStyle='rgba(80,80,80,0.45)'; ctx.lineWidth=1.8;
        [-1,1].forEach(s => {
            const ex = cx + s * eo;
            ctx.beginPath(); ctx.moveTo(ex-es,cy-es); ctx.lineTo(ex+es,cy+es);
            ctx.moveTo(ex+es,cy-es); ctx.lineTo(ex-es,cy+es); ctx.stroke();
        });
        return;
    }
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.arc(cx-eo, cy, es, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+eo, cy, es, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFF';
    ctx.beginPath(); ctx.arc(cx-eo+es*.4, cy-es*.4, es*.38, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+eo+es*.4, cy-es*.4, es*.38, 0, Math.PI*2); ctx.fill();
    if (ratio > 0.6) {
        ctx.fillStyle='rgba(255,110,110,0.32)';
        ctx.beginPath(); ctx.ellipse(cx-eo*1.7, cy+es*1.1, es*1.5, es*.75, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(cx+eo*1.7, cy+es*1.1, es*1.5, es*.75, 0, 0, Math.PI*2); ctx.fill();
    }
    ctx.strokeStyle='#333'; ctx.lineWidth=Math.min(t.w*.028, 1.8);
    const my = cy + es*3, mw = eo*.85;
    ctx.beginPath();
    if (ratio > 0.6) ctx.arc(cx, my-mw*.5, mw*.72, 0, Math.PI);
    else if (ratio > 0.3) { ctx.moveTo(cx-mw, my); ctx.lineTo(cx+mw, my); }
    else ctx.arc(cx, my+mw*.5, mw*.72, Math.PI, 0);
    ctx.stroke();
}

function drawPlayerChar() {
    const cx = P.x + P.w/2;
    const stunned = P.stunned > 0;
    const isWalking = Math.abs(P.vx) > 10 && P.onGround;
    const isDigging = digCooldown > 0.05;
    const DW = 82, DH = 82;

    // 掘り振動（digCooldown中に高速でブルブル）
    const t = Date.now();
    const digShX = isDigging ? Math.sin(t / 38) * 2.5 : 0;
    const digShY = isDigging ? Math.abs(Math.sin(t / 45)) * -3.5 : 0;

    // 歩きボブ（掘り中は別の揺れを使う）
    const bob = P.onGround && !isDigging
        ? Math.sin(pAnim.phase) * (isWalking ? 4 : 1)
        : 0;
    const cy = P.y + P.h/2 + bob + digShY;

    // スーパーモードオーラ
    if (superMode) {
        const aura = ctx.createRadialGradient(cx,cy,2,cx,cy,DW/2+14);
        aura.addColorStop(0,'rgba(255,215,0,.85)'); aura.addColorStop(1,'rgba(255,215,0,0)');

    // 影

    ctx.beginPath(); ctx.ellipse(cx, P.y+P.h+3, DW/2*pAnim.sqX*0.75, 3.5, 0, 0, Math.PI*2); ctx.fill();

    // ===== 足アニメーション =====
    if (P.onGround && !stunned) {
        const legY = cy + DH/2 * pAnim.sqY - 7;
        ctx.fillStyle = '#18184a';
        if (isWalking) {
            // 交互に足を上げる歩行サイクル
            const lLift = Math.max(0, Math.sin(pAnim.phase)) * 10;
            const rLift = Math.max(0, Math.sin(pAnim.phase + Math.PI)) * 10;
            const lFwd  = Math.sin(pAnim.phase) * 5 * pAnim.facing;
            const rFwd  = Math.sin(pAnim.phase + Math.PI) * 5 * pAnim.facing;
            ctx.beginPath(); ctx.ellipse(cx - 11 + lFwd, legY - lLift, 7, 5.5, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(cx + 11 + rFwd, legY - rLift, 7, 5.5, 0, 0, Math.PI*2); ctx.fill();
        } else if (isDigging) {
            // 掘り中はブルブル
            const sh = Math.sin(t / 40) * 3;
            ctx.beginPath(); ctx.ellipse(cx - 11 + sh, legY, 7, 4.5, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(cx + 11 - sh, legY, 7, 4.5, 0, 0, Math.PI*2); ctx.fill();
        } else {
            ctx.beginPath(); ctx.ellipse(cx - 11, legY, 7.5, 5, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(cx + 11, legY, 7.5, 5, 0, 0, Math.PI*2); ctx.fill();
        }
    }

    // ===== キャビィ本体 =====
    ctx.save();
    ctx.translate(cx + digShX, cy);
    ctx.rotate(stunned ? Math.sin(t/80)*0.18 : pAnim.tilt);
    ctx.scale(pAnim.sqX * pAnim.facing, pAnim.sqY);
    if (stunned) ctx.globalAlpha = 0.6;
    ctx.drawImage(playerImg, -DW/2, -DH/2, DW, DH);
    ctx.restore();

    // スタン演出
    if (stunned) {
        ctx.strokeStyle='#CC0000'; ctx.lineWidth=2;
        [cx-7, cx+7].forEach(ex => {
            ctx.beginPath();
            ctx.moveTo(ex-3,cy-7); ctx.lineTo(ex+3,cy-3);
            ctx.moveTo(ex+3,cy-7); ctx.lineTo(ex-3,cy-3); ctx.stroke();
        });
        if (Math.floor(t/180)%2===0) {
            ctx.font='11px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText('★', cx-20, cy-DH/2-4); ctx.fillText('★', cx+20, cy-DH/2-4);
        }
    } else {
        if (superMode) {
            const ct = cy - DH/2 * pAnim.sqY - 2;
            ctx.fillStyle='#FFD700';
            ctx.beginPath();
            ctx.moveTo(cx-10,ct+2); ctx.lineTo(cx-10,ct-8); ctx.lineTo(cx-5,ct-4);
            ctx.lineTo(cx,ct-12); ctx.lineTo(cx+5,ct-4); ctx.lineTo(cx+10,ct-8); ctx.lineTo(cx+10,ct+2);
            ctx.closePath(); ctx.fill();
            ctx.strokeStyle='#AA7700'; ctx.lineWidth=1; ctx.stroke();
            ctx.fillStyle='#FF4444'; ctx.beginPath(); ctx.arc(cx,ct-11,2.5,0,Math.PI*2); ctx.fill();
        }
        const weapon = getWeapon();
        ctx.font='15px serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText(weapon.emoji, cx, cy - DH/2*pAnim.sqY - 2);
    }
}

function rrect(x,y,w,h,r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
}

function drawMini() {

    for (let i = 0; i < MINI_TASKS.length; i++) {
        const task = MINI_TASKS[i];
        const cx=CX, cy=cardY(i), cw=CW, ch=CH;
        ctx.save();
        rrect(cx,cy,cw,ch,10);
        ctx.fillStyle = task.done ? '#0d2a0d' : '#0d0d2a'; ctx.fill();
        ctx.strokeStyle = task.done ? '#44CC44' : '#4444AA'; ctx.lineWidth=2; ctx.stroke();

        ctx.font='bold 16px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top';
        ctx.fillText(task.label, cx+14, cy+12);

        ctx.fillStyle = task.done ? '#66CC66' : '#8888BB';
        ctx.font='12px sans-serif';
        ctx.fillText(task.sub, cx+14, cy+33);

        const bx=cx+14, by=cy+56, bw=cw-28, bh=16;
        ctx.fillStyle='#111'; ctx.fillRect(bx,by,bw,bh);
        const fw = bw * task.progress / 100;
        if (fw > 0) {
            const g = ctx.createLinearGradient(bx,0,bx+bw,0);
            g.addColorStop(0, task.done ? '#44FF44' : '#FF8800');
            g.addColorStop(1, task.done ? '#88FF44' : '#FFD700');
            ctx.fillStyle=g; ctx.fillRect(bx,by,fw,bh);
        }
        ctx.strokeStyle='#333'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);

        ctx.fillStyle='#FFF'; ctx.font='bold 12px sans-serif'; ctx.textAlign='right'; ctx.textBaseline='middle';
        ctx.fillText(Math.round(task.progress)+'%', cx+cw-14, by+bh/2);

            ctx.fillStyle='rgba(255,80,80,.9)'; ctx.font='bold 14px sans-serif'; ctx.textAlign='right'; ctx.textBaseline='top';
            ctx.fillText('📵 失敗…再挑戦不可', cx+cw-14, cy+12);

            ctx.fillText('👆 タップして挑戦！', cx+cw-14, cy+12);

}

function drawPlay() {
    const elapsed = (Date.now() - t0) / 1000;
    const bg = getBg(elapsed);
    const weapon = getWeapon();

    const grad = ctx.createLinearGradient(0,0,0,GY);
    grad.addColorStop(0,bg.sky1); grad.addColorStop(.65,bg.sky2); grad.addColorStop(1,bg.sky3);
    ctx.fillStyle=grad; ctx.fillRect(0,0,GW,GH);

    if (elapsed >= 30) {
        const sa = elapsed < 50 ? (elapsed-30)/20*.3 : .3+Math.min((elapsed-50)/8,1)*.55;
        ctx.fillStyle=`rgba(255,255,255,${sa.toFixed(2)})`;
        for (const [sx,sy] of STARS) { ctx.beginPath(); ctx.arc(sx,sy,1.2+Math.sin(elapsed*1.5+sx)*.4,0,Math.PI*2); ctx.fill(); }
    }
    ctx.font='30px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    if (elapsed < 30) ctx.fillText('☀️',760,52);
    else if (elapsed < 50) ctx.fillText('🌅',760,52+(elapsed-30)/20*55);
    else ctx.fillText('🌙',760,52);

    // 歯の周囲を口内らしい暗い色で覆う（空グラデが透けないように）
    const mouthOverlay = ctx.createLinearGradient(0, 200, 0, GY);
    mouthOverlay.addColorStop(0, 'rgba(15,4,4,0)');
    mouthOverlay.addColorStop(1, 'rgba(15,4,4,0.93)');
    ctx.fillStyle = mouthOverlay; ctx.fillRect(0, 200, GW, GY - 200);

    ctx.fillStyle=bg.gum; ctx.fillRect(0,GY,GW,GH-GY);
    ctx.fillStyle=bg.gl; ctx.fillRect(0,GY,GW,3);

    for (const t of TEETH) { drawTooth(t); drawCols(t); drawToothFace(t); drawToothHUD(t); }
    drawCandies(); drawBrush(); drawDropBrush();

    for (const d of dustParticles) {
        const a = d.life/d.maxLife;
        ctx.fillStyle=`rgba(255,220,100,${a.toFixed(2)})`;
        ctx.beginPath(); ctx.arc(d.x,d.y,3*a,0,Math.PI*2); ctx.fill();
    }

    if (P.stunned > 0 && Math.floor(P.stunned*8)%2===0) {
        ctx.fillStyle='rgba(255,80,80,.35)';
        ctx.beginPath(); ctx.arc(P.x+P.w/2,P.y+P.h/2,24,0,Math.PI*2); ctx.fill();
    }
    drawPlayerChar();

    if (P.jumps===1 && !P.onGround) {
        ctx.fillStyle='rgba(100,255,150,.75)'; ctx.font='11px sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText('もう1回！',P.x+P.w/2,P.y-26);
    }

    drawPopups();

    if (brushWarning > 0) {
        const ph = Math.sin(brushWarning*28);
        ctx.fillStyle=`rgba(255,0,0,${(.22+.18*ph).toFixed(2)})`; ctx.fillRect(0,0,GW,GH);
        ctx.fillStyle='#FFE040'; ctx.font='bold 24px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('⚠️ 歯ブラシ接近！！',GW/2,GY-110);
    }
    if (miniCutInTimer > 0) drawMiniCutIn(miniCutInTimer);

    const phaseLabel = elapsed < 30 ? '🌅朝' : elapsed < 50 ? '🌇夕方' : '🌙夜';
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(0,0,GW,32);
    ctx.font='bold 15px sans-serif'; ctx.textBaseline='middle';
    ctx.textAlign='left';
    const hud = (superMode ? '😈' : weapon.emoji) + ' スコア: ' + score + (ATK > getWeapon().atk ? '(×2)' : '') + (P.stunned > 0 ? ' 😵' : '');
    ctx.fillStyle='#FFF'; ctx.fillText(hud,10,16);
    ctx.textAlign='center';
    ctx.fillStyle = superMode ? '#FFD700' : '#FFF';
    ctx.fillText(superMode ? '👑 スーパー虫歯マン！' : '🦷 掘れ掘れ虫歯菌！',GW/2,16);
    ctx.textAlign='right'; ctx.fillStyle='#FFF';
    ctx.fillText(phaseLabel+'  ⏱ '+elapsed.toFixed(1)+'s',GW-10,16);
}

function calcKingdomScore() {
    const timeBonus  = Math.max(0, Math.round((240 - clearTime) * 25));
    const superBonus = superMode ? 3000 : 0;
    const miniBonus  = MINI_TASKS.filter(t => t.done).length * 500;
    return score * 12 + timeBonus + superBonus + miniBonus;
}
function getKingdomRank(ks) {
    if (ks >= 25000) return { rank:'SS', label:'虫歯大帝',  star:'👑👑👑', color:'#FFD700' };
    if (ks >= 18000) return { rank:'S',  label:'虫歯大王',  star:'👑👑',   color:'#FFD700' };
    if (ks >= 12000) return { rank:'A',  label:'虫歯王',    star:'⭐⭐⭐',  color:'#FF9900' };
    if (ks >= 7000)  return { rank:'B',  label:'虫歯頭領',  star:'⭐⭐',    color:'#C0C0C0' };
    if (ks >= 3000)  return { rank:'C',  label:'虫歯職人',  star:'⭐',      color:'#CD7F32' };
    return               { rank:'D',  label:'虫歯見習い', star:'🔧',      color:'#888888' };
}

    ctx.fillText('クリアタイム: '+clearTime.toFixed(1)+'秒  /  収集スコア: '+score+'点',GW/2,GH/2+102);

    // タップ
    const pulse = .65+.35*Math.sin(Date.now()/500);
    ctx.save(); ctx.globalAlpha=pulse;
    ctx.fillStyle='#8899CC'; ctx.font='15px sans-serif';
    ctx.fillText('👆 タップしてタイトルへ',GW/2,GH/2+145);
    ctx.restore();
}

function draw() {
    if (gameState === 'title') { drawTitle(); return; }
    if (gameState === 'howto') { drawHowto(); return; }
    if (gameState === 'mini')  { drawMini();  return; }
    if (gameState === 'shooting') { drawShooting(); return; }
    if (gameState === 'amida') { drawAmida(); return; }
    if (gameState === 'clear') { drawClear(); return; }
    drawPlay();
}

mkTeeth();
let last = 0;
function loop(ts) {
    const dt = Math.min((ts - last) / 1000, 0.05);
    last = ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// 閲覧数カウンター（counterapi.dev 無料API）
fetch('https://api.counterapi.dev/v1/mushibagame-ryoma/views/up')
  .then(r => r.json())
  .then(d => {
    const el = document.getElementById('viewCounter');
    if (el) el.textContent = '👁 閲覧数: ' + d.count.toLocaleString();
  })
  .catch(() => {});
</script>
